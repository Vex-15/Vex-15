name: Update Total Stars Badge

on:
  schedule:
    - cron: "0 0 * * *"    # once a day
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute total stars
        run: bash scripts/update-stars-badge.sh

      - name: Commit updated badge data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/stars.json
          git diff --staged --quiet || git commit -m "chore: update total stars badge"
          git push
